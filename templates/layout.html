<!DOCTYPE html>
<html>
<head>
    <title>FinSmart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
</head>

<body>
<div class="sidebar">

    <div class="logo">
        💰 <span>FinSmart</span>
    </div>
<ul class="sidebar-menu">

  <li class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
    <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
  </li>

  <li class="{% if request.endpoint == 'edit_profile' %}active{% endif %}">
    <a href="{{ url_for('edit_profile') }}">👤 Profile</a>
  </li>

  <!-- ✅ INCOME (covers all income pages) -->
  <li class="{% if 'income' in request.endpoint %}active{% endif %}">
    <a href="{{ url_for('income_summary') }}">💰 Income</a>
  </li>

  <!-- ✅ EXPENSE -->
  <li class="{% if 'expense' in request.endpoint %}active{% endif %}">
    <a href="{{ url_for('expense_management') }}">💸 Expenses</a>
  </li>

  <!-- ✅ SAVINGS -->
  <li class="{% if request.endpoint == 'savings' %}active{% endif %}">
    <a href="{{ url_for('savings') }}">🏦 Savings</a>
  </li>

  <!-- ✅ ANALYTICS -->
  <li class="{% if request.endpoint == 'financial_analytics' %}active{% endif %}">
    <a href="{{ url_for('financial_analytics') }}">📈 Analytics</a>
  </li>

  <!-- ✅ GOALS -->
  <li class="{% if 'goals' in request.endpoint %}active{% endif %}">
  <a href="{{ url_for('goals_page') }}">🎯 Goals</a>
</li>

  <li class="{% if request.endpoint == 'change_password' %}active{% endif %}">
    <a href="{{ url_for('change_password') }}">🔒 Change Password</a>
  </li>
<li class="{% if request.endpoint == 'logout' %}active{% endif %}">
    <a href="{{ url_for('logout') }}">🚪Logout</a>
</li>

</ul>

</div>

    <!-- 🔥 RIGHT SIDE CONTENT -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const toasts = document.querySelectorAll('.toast');

  if (toasts.length > 0) {
    setTimeout(() => {
      toasts.forEach(t => {
        t.style.opacity = "0";  // fade out
        t.style.transform = "translateY(-10px)";

        setTimeout(() => t.remove(), 500); // remove after fade
      });
    }, 3000);
  }

});
</script>
</html>
