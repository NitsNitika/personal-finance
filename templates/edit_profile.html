<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h2 class="welcome-text">
            Welcome back to <span> FinSmart 👋</span>
        </h2>

        <h2 class="form-title">Edit Profile</h2>

        <!-- 🔥 PROFILE IMAGE PREVIEW (NEW) -->
        <div style="text-align:center; margin-bottom:15px;">
            <img 
                src="{{ url_for('static', filename='uploads/' + (profile_pic or 'default.png')) }}"
                alt="Profile"
                style="width:100px; height:100px; border-radius:10%; object-fit:cover; border:2px solid #6366f1;"
            >
        </div>

        <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data" class="edit-profile-form">

            <input
                type="text"
                name="name"
                value="{{ user['name'] }}"
                class="input-field"
                required
            >

            <input
                type="email"
                name="email"
                value="{{ user['email'] }}"
                class="input-field"
                required
            >

            <input
                type="file"
                name="profile_pic"
                class="file-input"
                accept="image/*"
            >

            <button type="submit" class="btn-primary">
                Save Changes
            </button>

        </form>

        <!-- 🔥 FIXED TEXT -->
        <a href="{{ url_for('dashboard') }}" class="back-link">
            Back to Dashboard
        </a>

    </div>
</div>

</body>
</html>
