{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- ✅ DASHBOARD TITLE OUTSIDE -->
<div class="page-header">
    <h1>Dashboard</h1>
</div>

<!-- ✅ MAIN CONTAINER -->
<div class="dashboard-wrapper">

  <!-- PROFILE HEADER -->
  <div class="profile-header">
      <img id="userAvatar" src="/static/images/default.png" alt="User">

      <div>
          <h2>Hello <span id="userName">User</span> 👋</h2>
          <p>Welcome back!</p>
      </div>
  </div>

  <!-- TOP CARDS -->
  <div class="dashboard-cards">

    <div class="dash-card income">
      <div>
        <h4>Total Income</h4>
        <p id="income">₹0</p>
      </div>
      <span>💰</span>
    </div>

    <div class="dash-card expense">
      <div>
        <h4>Total Expenses</h4>
        <p id="expenses">₹0</p>
      </div>
      <span>💸</span>
    </div>

    <div class="dash-card savings">
      <div>
        <h4>Total Savings</h4>
        <p id="savings">₹0</p>
      </div>
      <span>📈</span>
    </div>

  </div>

  <!-- GRID -->
  <div class="dashboard-grid">

    <!-- TRANSACTIONS -->
    <div class="card">
      <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Recent Transactions</h3>
        <button id="toggleBtn" class="view-btn">View All →</button>
      </div>

      <ul id="transactionsList" class="transaction-list"></ul>
    </div>

    <!-- GOALS -->
    <div class="card">
      <div class="card-header">
        <h3>Goals Progress</h3>
      </div>
      <div id="goalsList"></div>
    </div>

  </div>

</div>

<script>

// GLOBAL
let showAll = false;
let allTransactions = [];

// LOAD DATA
async function loadDashboard() {
    console.log("Dashboard loaded");

    try {
        const res = await fetch("/dashboard-data");
        const data = await res.json();

        if (!data || data.error) return;

        // PROFILE
        document.getElementById("userName").innerText = data.user_name || "User";
        document.getElementById("userAvatar").src =
            (data.user_image || "/static/images/default.png") + "?t=" + new Date().getTime();

        // TOTALS
        document.getElementById("income").innerText = "₹" + (data.income || 0);
        document.getElementById("expenses").innerText = "₹" + (data.expenses || 0);
        document.getElementById("savings").innerText = "₹" + (data.savings || 0);

        // TRANSACTIONS
        allTransactions = data.transactions || [];
        renderTransactions();

        document.getElementById("toggleBtn").onclick = () => {
            showAll = !showAll;
            renderTransactions();
        };

        // GOALS
        const goalsDiv = document.getElementById("goalsList");
        goalsDiv.innerHTML = "";

        if (!data.goals || data.goals.length === 0) {
            goalsDiv.innerHTML = "<p>No goals added</p>";
        } else {
            data.goals.forEach(g => {
                const saved = g.saved_amount || 0;
                const target = g.target_amount || 0;

                const percent = target > 0
                    ? Math.min((saved / target) * 100, 100).toFixed(0)
                    : 0;

                goalsDiv.innerHTML += `
                    <div class="goal-item">
                        <div class="goal-header">
                            <span>${g.title}</span>
                            <span>${percent}%</span>
                        </div>

                        <div class="progress-bar">
                            <div style="width:${percent}%"></div>
                        </div>

                        <small>₹${saved} / ₹${target}</small>
                    </div>
                `;
            });
        }

    } catch (err) {
        console.error(err);
    }
}

// RENDER TRANSACTIONS
function renderTransactions() {
    const list = document.getElementById("transactionsList");
    const btn = document.getElementById("toggleBtn");

    list.innerHTML = "";

    if (!allTransactions.length) {
        list.innerHTML = "<p>No transactions</p>";
        return;
    }

    const dataToShow = showAll ? allTransactions : allTransactions.slice(0, 5);

    dataToShow.forEach(t => {
        const li = document.createElement("li");

        li.innerHTML = `
            <div class="txn-left">
                <div class="txn-icon ${t.type}">
                    ${t.type === 'income' ? '↑' : '↓'}
                </div>

                <div>
                    <p class="txn-title">${t.title}</p>
                    <small>${t.date}</small>
                </div>
            </div>

            <span class="${t.type === 'income' ? 'plus' : 'minus'}">
                ${t.type === 'income' ? '+' : '-'}₹${t.amount}
            </span>
        `;

        list.appendChild(li);
    });

    btn.innerText = showAll ? "View Less ↑" : "View All →";
}

// INIT
loadDashboard();

</script>

{% endblock %}
