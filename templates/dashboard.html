{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<div class="page-container">

  <!-- HEADER -->
  <div class="page-header">
    <h1>User Profile</h1>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card-new">

    <div class="profile-top">
      {% if user['profile_pic'] %}
        <img src="{{ url_for('static', filename='uploads/' + user['profile_pic']) }}" class="avatar-img">
      {% else %}
        <div class="avatar-circle">Profile</div>
      {% endif %}

      <h2>{{ user['name'] }}</h2>
      <p>{{ user['email'] }}</p>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="profile-grid">

      <a href="{{ url_for('edit_profile') }}" class="card-btn primary">
        Edit Profile ✏️
      </a>

      <a href="{{ url_for('change_password') }}" class="card-btn outline">
        Change Password 🔒
      </a>

      <a href="{{ url_for('income_summary') }}" class="card-btn">
        Income 💰
      </a>

      <a href="{{ url_for('expense_management') }}" class="card-btn">
        Expenses 💸
      </a>

      <a href="{{ url_for('savings') }}" class="card-btn">
        Savings 💰
      </a>

      <a href="{{ url_for('financial_analytics') }}" class="card-btn">
        Analytics 📊
      </a>

      <a href="{{ url_for('goals_page') }}" class="card-btn">
        Goals 🎯
      </a>

      <a href="{{ url_for('logout') }}" class="card-btn danger">
        Logout 🚪
      </a>

    </div>

  </div>

</div>

{% endblock %}
