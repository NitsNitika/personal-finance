<!DOCTYPE html>
<html>
<head>
    <title>FinSmart</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0,0,0,0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .hero {
            text-align: center;
            padding: 120px 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin: 20px 10px;
            padding: 12px 25px;
            background: white;
            color: #2563eb;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>💰 FinSmart</h2>
        <div>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
        <h1>Manage Your Money Smarter 💡</h1>
        <p>Track income, control expenses, and achieve your financial goals effortlessly.</p>

        <a href="/login" class="btn">Login</a>
        <a href="/register" class="btn">Get Started</a>
    </div>

</body>
</html>
